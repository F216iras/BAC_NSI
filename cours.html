    const panelsEl = document.getElementById('panels');

    COURS.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.textContent = c.titre;
      btn.onclick = () => switchTab(c.id);
      tabsEl.appendChild(btn);

      const panel = document.createElement('div');
      panel.id = 'panel-' + c.id;
      panel.className = 'cours-panel' + (i === 0 ? ' active' : '');

      const ptsHtml = c.points_cles.map(p => `<li>${p}</li>`).join('');
      const sectionsHtml = c.sections.map(s => `
        <div class="accordion-item">
          <button class="accordion-btn" onclick="toggleAccordion(this)">
            ${s.titre}
            <span class="arrow">▼</span>
          </button>
          <div class="accordion-content">${s.texte}</div>
        </div>
      `).join('');

      panel.innerHTML = `
        <div class="cours-title">${c.titre}</div>
        <div class="points-cles">
          <h3>Points clés</h3>
          <ul>${ptsHtml}</ul>
        </div>
        <div class="accordion">${sectionsHtml}</div>
      `;
      panelsEl.appendChild(panel);
    });

    function switchTab(id) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', COURS[i].id === id);
      });
      document.querySelectorAll('.cours-panel').forEach(p => {
        p.classList.toggle('active', p.id === 'panel-' + id);
      });
    }

    function toggleAccordion(btn) {
      const content = btn.nextElementSibling;
      const isOpen = content.classList.contains('open');
      btn.classList.toggle('open', !isOpen);
      content.classList.toggle('open', !isOpen);
    }

    document.querySelector('.accordion-btn').click();
  </script>
</body>
</html>
