        const badgeClass = e.niveau === 'Facile' ? 'badge-facile' : e.niveau === 'Moyen' ? 'badge-moyen' : 'badge-difficile';
        return `
          <div class="exo-card">
            <div class="exo-header">
              <div class="exo-title">${e.titre}</div>
              <span class="badge ${badgeClass}">${e.niveau}</span>
            </div>
            <div class="exo-meta">${e.theme}</div>
            <div class="exo-enonce">${e.enonce}</div>
            <div style="margin-bottom:0.75rem">
              <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.4rem">Code de départ :</div>
              <pre>${escHtml(e.code_depart)}</pre>
            </div>
            <button class="toggle-correction" onclick="toggleCorrection(this)">Voir la correction</button>
            <div class="correction-wrap">
              <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.4rem">Correction :</div>
              <pre>${escHtml(e.correction)}</pre>
              <div class="explication">${e.explication}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function toggleCorrection(btn) {
      const wrap = btn.nextElementSibling;
      const isOpen = wrap.classList.contains('show');
      wrap.classList.toggle('show', !isOpen);
      btn.textContent = isOpen ? 'Voir la correction' : 'Masquer la correction';
    }

    renderExos();
  </script>
</body>
</html>
